<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplikationsspelet</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <video id="webcam" autoplay playsinline></video>
  <canvas id="gameCanvas"></canvas>

  <div id="ui" class="hidden">
    <div id="topBar">
      <div id="scoreDisplay">
        <span id="scoreLabel">POANG</span>
        <span id="score">0</span>
      </div>
      <div id="problemDisplay"></div>
      <div id="modeToggle">
        <button id="modeBtn" title="Byt mellan multiplikation och division"></button>
      </div>
    </div>
    <div id="streakDisplay" class="hidden"></div>
  </div>

  <div id="startScreen">
    <div id="startContent">
      <h1>Multiplikations&shy;spelet</h1>
      <p>Fanga ratt svar med dina hander!</p>
      <div id="tableSelector">
        <span class="table-label">Valj tabeller:</span>
        <div id="tableButtons"></div>
      </div>
      <button id="startBtn">Starta</button>
    </div>
  </div>

  <div id="feedback" class="hidden"></div>

  <div id="loading" class="hidden">
    <div class="loader"></div>
    <p>Startar kameran...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="game.js"></script>
</body>
</html>
